name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Tier 1: no intra-workspace dependencies
      - name: Publish tpt-snapshot-lite
        run: cargo publish -p tpt-snapshot-lite

      - name: Publish tpt-temp-fs
        run: cargo publish -p tpt-temp-fs

      - name: Publish tpt-cargo-scrub
        run: cargo publish -p tpt-cargo-scrub

      - name: Publish tpt-env-mocker-macros
        run: cargo publish -p tpt-env-mocker-macros

      # Wait for crates.io index to propagate tpt-env-mocker-macros
      - name: Wait for index propagation
        run: sleep 60

      # Tier 2: depends on tpt-env-mocker-macros published above
      - name: Publish tpt-env-mocker
        run: cargo publish -p tpt-env-mocker
